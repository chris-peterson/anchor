name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tmpfile:
    # The temp-path helper's portability claim is cross-platform, so prove it on
    # each mktemp it must survive: GNU coreutils (ubuntu), BSD (macos — the
    # binary that broke the old form), and Git Bash's MSYS2 mktemp (windows).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: temp-path helper
        run: bash tests/tmpfile.test.sh

  commit:
    # Exercises scripts/commit.sh end-to-end (commit + push variants, the
    # push-existing mode, and the default-branch guard) against a local bare
    # remote.
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: commit helper
        run: bash tests/commit.test.sh
      - name: commit preflight
        run: bash tests/commit-preflight.test.sh

  review:
    # Exercises the review dispatcher and its moor/revdiff adapters against stub
    # backends, asserting the normalized REV contract each emits.
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: review dispatcher + adapters
        run: bash tests/review-diff.test.sh
