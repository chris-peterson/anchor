# Canonical descriptor for the anchor plugin — edit here, never plugin.json.
# Projects into .claude-plugin/plugin.json (via scripts/gen-plugin-json.py) and
# the marketplace SPA (the suite: block).

name: anchor
version: 0.19.2
description: Git/forge skills for consistent and effective source control.
author: chris-peterson
repository: https://github.com/chris-peterson/anchor
icon: docs/favicon.svg
license: MIT
keywords: [commit, issue, pull-request, merge-request, review, git, forge, ai, claude-code]

# → marketplace.json entry
marketplace:
  category: development
  homepage: https://chris-peterson.github.io/anchor/#/

# → marketplace SPA; keys mirror the SPA's PLUGINS object.
suite:
  group: waypoints
  dependencies:
    - name: moor
      required: false
      reason: launches moor for diff review
    - name: tack
      required: false
      reason: resolves a named target repo through tack's repo db
  # Activated by user-invoked skills (commit, prepare-review) and by ambient
  # rules injected at session start.
  activations: [user, session]
  gloss: An anchor holds a boat in place. This holds your work in place.
  pitch: "Nervous about keeping code you didn't write? It walks you through the diff first, then commits with a why-first message and opens the change request."
  what: "Keeps your commits, change requests, and review cycles consistent — the same quality, formatting, and content every time, not reinvented per change."
  cmds:
    - ["/anchor:commit", "Commit with a why-first message; --preview reviews the working tree first"]
    - ["/anchor:prepare-review", "Rebase on main and open a draft change request"]
    - ["/anchor:resolve-feedback", "Work a CR's review threads to done, one by one"]
  # Skill-anchored previews of the two flagship skills, shown live on the docs
  # site; the session: below is the at-a-glance flow the hub also reads. Frames
  # are lifted from real runs (moor rejections, the WHY prompt, the CR structure)
  # so the previews read as an actual session, not a script.
  examples:
    - label: "/anchor:commit"
      ac: "--ship"
      frames:
        - { t: you, text: "/anchor:commit" }
        - { t: claude, text: "Tests pass. Staging everything, then opening the diff in moor for a hunk-level look before I write the message." }
        - { t: moor, del: "Write the subject, then a blank line, then a why-first body.", add: "Write the subject, then a why-first body — see the commit-message template.", rej: "if we defer to the template, we should avoid repeating its contents" }
        - { t: claude, text: "Committed df7a13e with a why-first message. The rejected hunk comes back as a concrete edit — and I sweep every site with the same pattern, not just the flagged line." }
    - label: "/anchor:prepare-review"
      ac: "--orient"
      frames:
        - { t: you, text: "/anchor:prepare-review" }
        - { t: claude, text: "Branch is 13 behind main and the CR's still a draft, so rebasing is low-risk. Rebased clean, force-pushed with lease." }
        - { t: claude, text: "Before I draft — what problem does this solve? My read of the diff: --preview on a clean tree used to just stop; now it offers a branch review. Is that the WHY, or is there more?" }
        - { t: you, text: "that's it" }
        - { t: claude, text: "Draft CR #13 opened. The description leads with the Context, then a Review guide that deep-links the critical path so a reviewer's skim lands where their judgment matters." }
  session:
    - { t: you, text: "/anchor:commit" }
    - { t: claude, text: "No test suite here — staging everything, then a why-first message from the diff. Opening moor for the hunk-level review." }
    - { t: moor, del: "Write the subject, then a blank line, then a why-first body.", add: "Write the subject, then a why-first body — see the commit-message template.", rej: "if we defer to the template, we should avoid repeating its contents" }
    - { t: claude, text: "Committed df7a13e. Review came back with five fix-now comments — each rejected hunk goes back as a concrete edit, swept across every site that shares the pattern." }
