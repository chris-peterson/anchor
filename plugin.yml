# Canonical descriptor for the anchor plugin — edit here, never plugin.json.
# shipyard projects this into .claude-plugin/plugin.json and the marketplace
# catalog (the suite: block). suite.describe is generated from the
# skills/rules/hooks sources — run `just build`, don't hand-edit it.

name: anchor
version: 0.22.1
description: Git/forge skills for consistent and effective source control.
author: chris-peterson
repository: https://github.com/chris-peterson/anchor
icon: docs/favicon.svg
license: MIT
keywords: [commit, issue, pull-request, merge-request, review, git, forge, ai, claude-code]

# → marketplace.json entry
marketplace:
  category: development
  homepage: https://chris-peterson.github.io/anchor/#/

# → marketplace SPA; keys mirror the SPA's PLUGINS object.
suite:
  group: waypoints
  dependencies:
    - name: moor
      required: false
      reason: launches moor for diff review
    - name: tack
      required: false
      reason: resolves a named target repo through tack's repo db
  # Activated by user-invoked skills (commit, prepare-review) and by ambient
  # rules injected at session start.
  activations: [user, session]
  gloss: An anchor holds a boat in place. This holds your work in place.
  pitch: "Nervous about keeping code you didn't write? It walks you through the diff first, then commits with a why-first message and opens the change request."
  what: "Keeps your commits, change requests, and review cycles consistent — the same quality, formatting, and content every time, not reinvented per change."
  cmds:
    - ["/anchor:commit", "Commit with a why-first message; --preview reviews the working tree first"]
    - ["/anchor:prepare-review", "Rebase on main and open a draft change request"]
    - ["/anchor:resolve-feedback", "Work a CR's review threads to done, one by one"]
  # Skill-anchored previews of the two flagship skills, shown live on the docs
  # site; the session: below is the at-a-glance flow the hub also reads. Frames
  # are lifted from real runs (moor rejections, the WHY prompt, the CR structure)
  # so the previews read as an actual session, not a script.
  # >>> shipyard:describe — generated from source by `shipyard gen-describe`; do not edit >>>
  describe:
    skills:
      commit: Stage changes, run tests, and write a commit message.
      issue: Draft and file (or update) a forge issue that leads with WHY the work is needed.
      pipeline: Report a commit's forge pipeline state, or watch until it settles.
      prepare-review: Rebase on the default branch, push, open the PR/MR, and draft a description that tells reviewers WHY the change exists.
      resolve-feedback: Fetch an open CR's review feedback and drive each thread to resolution — fix, reply, resolve.
    rules:
      omit-attribution-trailers: Omit AI attribution trailers
      rewrite-history-through-anchor: Route history rewrites through anchor
      use-forge-clis: Drive forge operations through `gh` / `glab`
    hooks:
      emit-rules: SessionStart — Emits the plugin's ambient rules into the agent's context.
      hooks: 'Hook wiring: SessionStart→emit-rules.'
  # <<< shipyard:describe <<<
  examples:
    - label: "/anchor:commit"
      ac: "--ship"
      frames:
        - { t: you, text: "/anchor:commit" }
        - { t: claude, text: "214 tests green, staged. Ahead-count 0, so this is a new commit — opening moor for a hunk-level look before I write the message." }
        - { t: moor, del: "const fare = crossesMidnight ? DAILY_MAX : mins * RATE", add: "const fare = Math.min(mins * RATE, DAILY_MAX)", rej: "good fix — but DAILY_MAX is now defined here and in pricing.js; use the one source" }
        - { t: claude, text: "Committed 4a1f9c2. The rejected hunk came back as an edit — DAILY_MAX now imported from pricing.js — and I swept the two other call sites with the same duplication. Message leads with the overcharge, not the diff." }
    - label: "/anchor:prepare-review"
      ac: "--orient"
      frames:
        - { t: you, text: "/anchor:prepare-review" }
        - { t: claude, text: "Branch is 8 behind main and the CR's still a draft, so rebasing is low-risk. Rebased clean, force-pushed with lease." }
        - { t: claude, text: "Before I draft — the WHY, in one line: riders on trips crossing midnight were billed the full daily max instead of elapsed minutes. Is that the whole story?" }
        - { t: you, text: "yeah — support flagged three overcharges this week" }
        - { t: claude, text: "Draft CR #128 opened. The description leads with the overcharge, then a Review guide that deep-links the fare-cap change so a reviewer's skim lands on the money path first." }
  session:
    - { t: you, text: "/anchor:commit" }
    - { t: claude, text: "No unpushed commits here, so this is a new commit. Running the suite before I stage anything." }
    - { t: cmd, cmd: "npm test", out: "Tests: 214 passed, 214 total" }
    - { t: claude, text: "Green. Staged the fare-calc fix — opening moor for a hunk-level look before I write the message." }
    - { t: moor, del: "const fare = crossesMidnight ? DAILY_MAX : mins * RATE", add: "const fare = Math.min(mins * RATE, DAILY_MAX)", rej: "good fix — but DAILY_MAX is now defined here and in pricing.js; use the one source" }
    - { t: claude, text: "Committed 4a1f9c2. The rejected hunk came back as a concrete edit — DAILY_MAX pulled from pricing.js — and I swept every call site that had the same duplication." }
