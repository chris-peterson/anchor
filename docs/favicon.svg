<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#282a36"/>
  <g fill="none" stroke="#8be9fd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ring (shackle) -->
    <circle cx="32" cy="13" r="4.5"/>
